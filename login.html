<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.png" type="image/png" id="fav">
  <title>Login — Syntax Syndicate | Access Your Account</title>
  <meta name="description" content="Log in to your Syntax Syndicate account to apply for tech internships, developer jobs, hackathons, and events worldwide. Free platform for developers.">
  <meta name="keywords" content="Syntax Syndicate login, developer account login, internship portal signin">
  <meta name="author" content="Syntax Syndicate">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://opportunities.syntaxsyndicate.co.in/login.html">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Syntax Syndicate">
  <meta property="og:title" content="Login — Syntax Syndicate">
  <meta property="og:description" content="Sign in to Syntax Syndicate and apply to verified tech opportunities worldwide.">
  <meta property="og:url" content="https://opportunities.syntaxsyndicate.co.in/login.html">
  <meta property="og:image" content="https://opportunities.syntaxsyndicate.co.in/og-image.png">
  <meta property="og:locale" content="en_IN">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Login — Syntax Syndicate">
  <meta name="twitter:description" content="Sign in to your Syntax Syndicate developer account.">
  <meta name="twitter:image" content="https://opportunities.syntaxsyndicate.co.in/og-image.png">

  <script>document.getElementById('fav').onerror=function(){this.href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a56db'/><text y='22' x='5' font-size='18' font-family='system-ui'>⚡</text></svg>";}</script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <img src="logo.png" alt="Syntax Syndicate" class="auth-logo-img"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="auth-logo-icon" style="display:none"><i class="bi bi-lightning-charge-fill"></i></div>
      <span class="auth-logo-text">Syntax Syndicate</span>
    </a>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div style="position:relative">
        <input type="password" id="password" class="form-input" placeholder="Enter your password" style="padding-right:42px">
        <button type="button" id="toggle-pw" style="position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;padding:4px">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <div class="form-error" id="error-msg"></div>

    <button class="btn btn-primary btn-full btn-lg" id="submit-btn" style="margin-top:4px">
      <i class="bi bi-box-arrow-in-right"></i> Sign In
    </button>

    <div class="auth-divider"><span>or</span></div>
    <p class="auth-link">Don't have an account? <a href="signup.html">Create one free →</a></p>
  </div>
</div>
<div class="toast-container"></div>
<script type="module">
  import { login, showToast, getUserRole, onAuthChange } from './js/auth.js';
  const redirect = new URLSearchParams(location.search).get('redirect');
  onAuthChange(async u => {
    if (u) { const r=await getUserRole(u.uid); location.href=redirect?decodeURIComponent(redirect):(r==='admin'?'admin.html':'index.html'); }
  });
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw=document.getElementById('password'), i=document.querySelector('#toggle-pw i');
    pw.type=pw.type==='password'?'text':'password';
    i.className=pw.type==='password'?'bi bi-eye':'bi bi-eye-slash';
  });
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const email=document.getElementById('email').value.trim();
    const pass =document.getElementById('password').value;
    const err  =document.getElementById('error-msg');
    const btn  =document.getElementById('submit-btn');
    if (!email||!pass){err.textContent='Please fill in all fields.';err.style.display='block';return;}
    err.style.display='none';
    btn.innerHTML='<i class="bi bi-arrow-repeat" style="animation:spin 0.7s linear infinite"></i> Signing in…';
    btn.disabled=true;
    try {
      const u=await login(email,pass); const r=await getUserRole(u.uid);
      showToast('Welcome back!','success');
      setTimeout(()=>{location.href=redirect?decodeURIComponent(redirect):(r==='admin'?'admin.html':'index.html');},700);
    } catch(e) {
      const msgs={'auth/user-not-found':'No account with this email.','auth/wrong-password':'Incorrect password.','auth/invalid-credential':'Invalid email or password.','auth/too-many-requests':'Too many attempts. Try again later.'};
      err.textContent=msgs[e.code]||'Login failed. Please try again.'; err.style.display='block';
      btn.innerHTML='<i class="bi bi-box-arrow-in-right"></i> Sign In'; btn.disabled=false;
    }
  });
  // Disable Right Click
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

// Disable common DevTools shortcuts
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+Shift+C (Inspect Element)
    if (e.ctrlKey && e.shiftKey && e.key === "C") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }

    // Ctrl+S (Save Page)
    if (e.ctrlKey && e.key === "s") {
        e.preventDefault();
    }
});

// DevTools open detection (basic trick)
setInterval(function () {
    if (window.outerWidth - window.innerWidth > 160 || 
        window.outerHeight - window.innerHeight > 160) {
        document.body.innerHTML = "";
    }
}, 1000);
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body></html>
